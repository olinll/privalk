<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Privalk - 私密语音聊天</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <script src="/js/tailwind.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'squawk-bg': '#0b0d14',
            'squawk-bg2': '#10121a',
            'squawk-bg3': '#161922',
            'squawk-card': 'rgba(255,255,255,0.04)',
            'squawk-card-hover': 'rgba(255,255,255,0.07)',
            'squawk-border': 'rgba(255,255,255,0.07)',
            'squawk-border2': 'rgba(255,255,255,0.12)',
            'squawk-text': '#ffffff',
            'squawk-text-mid': '#8b8fa8',
            'squawk-text-dim': '#4a4d62',
            'squawk-blue': '#4f7dff',
            'squawk-blue2': '#6b93ff',
            'squawk-blue-glow': '#4f7dff30',
            'squawk-blue-soft': '#4f7dff18',
            'squawk-red': '#ff5c7a',
            'squawk-green': '#2dd4a0',
            'squawk-gold': '#f59e0b',
          },
          fontFamily: {
            'sans': ['Plus Jakarta Sans', 'Noto Sans SC', 'sans-serif'],
          },
          animation: {
            'wave-idle': 'wave-idle 1.2s ease-in-out infinite',
            'wave-big': 'wave-big 1.4s ease-in-out infinite',
            'pulse-dot': 'pulse-dot 2.5s infinite',
            'record-pulse': 'record-pulse 2s ease-in-out infinite',
            'speak-ring': 'speak-ring 1s ease-out infinite',
            'msg-in': 'msg-in 0.2s ease',
            'ctx-in': 'ctx-in 0.12s ease',
            'toast-in': 'toast-in 0.25s ease',
            'toast-out': 'toast-out 0.25s ease 2.75s forwards',
            'fade-up': 'fade-up 0.4s ease both',
          },
          keyframes: {
            'wave-idle': { '0%,100%': { transform: 'scaleY(1)' }, '50%': { transform: 'scaleY(0.5)' } },
            'wave-big': { '0%,100%': { transform: 'scaleY(1)', opacity: '0.7' }, '50%': { transform: 'scaleY(0.4)', opacity: '1' } },
            'pulse-dot': { '0%,100%': { opacity: '1' }, '50%': { opacity: '0.4' } },
            'record-pulse': { '0%,100%': { transform: 'scale(1)', opacity: '1' }, '50%': { transform: 'scale(1.08)', opacity: '0.5' } },
            'speak-ring': { '0%': { transform: 'scale(0.9)', opacity: '0.6' }, '100%': { transform: 'scale(1.3)', opacity: '0' } },
            'msg-in': { from: { opacity: '0', transform: 'translateY(6px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            'ctx-in': { from: { opacity: '0', transform: 'scale(0.95)' }, to: { opacity: '1', transform: 'scale(1)' } },
            'toast-in': { from: { opacity: '0', transform: 'translateX(14px)' }, to: { opacity: '1', transform: 'translateX(0)' } },
            'toast-out': { to: { opacity: '0', transform: 'translateX(14px)' } },
            'fade-up': { from: { opacity: '0', transform: 'translateY(16px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --bg: #0b0d14; --bg2: #10121a; --bg3: #161922;
      --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
      --text: #ffffff; --text-mid: #8b8fa8; --text-dim: #4a4d62;
      --glow-opacity: 0.3; --shadow-strength: 0.5;
      --input-bg: rgba(255,255,255,0.05);
    }
    .light {
      --bg: #f8fafc; --bg2: #f1f5f9; --bg3: #ffffff;
      --card: rgba(0,0,0,0.03); --card-hover: rgba(0,0,0,0.06);
      --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.12);
      --text: #0f172a; --text-mid: #475569; --text-dim: #94a3b8;
      --glow-opacity: 0.15; --shadow-strength: 0.15;
      --input-bg: rgba(0,0,0,0.04);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height:100%; overflow:hidden; }
    body { background: var(--bg); color: var(--text); }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(79,125,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(79,125,255,0.05) 0%, transparent 60%);
    }
    .light body::before {
      background:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(79,125,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(79,125,255,0.02) 0%, transparent 60%);
    }
    /* 主题变量覆盖 Tailwind 颜色 */
    .light .bg-squawk-bg { background-color: var(--bg) !important; }
    .light .bg-squawk-bg2 { background-color: var(--bg2) !important; }
    .light .bg-squawk-bg3 { background-color: var(--bg3) !important; }
    .light .bg-squawk-card { background-color: var(--card) !important; }
    .light .bg-squawk-card-hover { background-color: var(--card-hover) !important; }
    .light .border-squawk-border { border-color: var(--border) !important; }
    .light .border-squawk-border2 { border-color: var(--border2) !important; }
    .light .text-squawk-text { color: var(--text) !important; }
    .light .text-squawk-text-mid { color: var(--text-mid) !important; }
    .light .text-squawk-text-dim { color: var(--text-dim) !important; }
    .light .bg-white\/5 { background-color: var(--input-bg) !important; }
    .light .bg-black\/60 { background-color: rgba(0,0,0,0.3) !important; }
    .light .shadow-black\/50 { --tw-shadow-color: rgba(0,0,0,0.2) !important; }
    .light .shadow-black\/30 { --tw-shadow-color: rgba(0,0,0,0.1) !important; }
    .light .shadow-black\/40 { --tw-shadow-color: rgba(0,0,0,0.15) !important; }
    .light #header { background-color: var(--bg3) !important; border-color: var(--border) !important; }
    .light #controls { background-color: var(--bg2) !important; border-color: var(--border) !important; }
    .light #sidebar { background-color: var(--bg2) !important; border-color: var(--border) !important; }
    .light .bg-squawk-blue-soft { background-color: rgba(79,125,255,0.1) !important; }
    .light .border-squawk-blue\/20 { border-color: rgba(79,125,255,0.2) !important; }
    .light .shadow-squawk-blue-glow { --tw-shadow-color: rgba(79,125,255,0.15) !important; }
    #app { display:grid; grid-template-columns:auto 1fr auto; grid-template-rows:64px 1fr 72px; height:100vh; position:relative; z-index:1; grid-template-areas:"header header header" "sidebar main voice" "controls controls controls"; }
    .sidebar-wrap { grid-area:sidebar; display:flex; overflow:hidden; }
    .voice-wrap { grid-area:voice; display:flex; overflow:hidden; }
    #sidebar { width:240px; min-width:240px; transition:width 0.3s cubic-bezier(0.4,0,0.2,1), min-width 0.3s cubic-bezier(0.4,0,0.2,1); overflow:hidden; display:flex; flex-direction:column; gap:4px; background:var(--bg2); border-right:1px solid var(--border); padding:14px; }
    #sidebar.collapsed { width:56px; min-width:56px; }
    #sidebar.collapsed .sidebar-text { display:none; }
    #sidebar.collapsed .sidebar-header-text { display:none; }
    #sidebar.collapsed #room-list { align-items:center; padding:0 2px; }
    #sidebar.collapsed .room-item { justify-content:center; padding:6px 0; gap:0; width:100%; }
    #sidebar.collapsed .room-item .room-avatar { width:36px; height:36px; font-size:16px; }
    #sidebar.collapsed .room-item .room-name,
    #sidebar.collapsed .room-item .room-count { display:none; }
    #sidebar.collapsed .sidebar-header { justify-content:center; padding:0 4px; }
    #sidebar.collapsed #open-create-modal { margin:0; }
    #main { grid-area:main; min-width:0; }
    #voice-panel { width:280px; min-width:280px; transition:width 0.3s cubic-bezier(0.4,0,0.2,1), min-width 0.3s cubic-bezier(0.4,0,0.2,1); overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:28px; background:var(--bg2); border-right:1px solid var(--border); }
    #voice-panel.collapsed { width:56px; min-width:56px; padding:14px 8px; gap:12px; }
    #voice-panel.collapsed .voice-text { display:none; }
    #voice-panel.collapsed .voice-header { justify-content:center; width:100%; }
    #voice-panel.collapsed #users-grid { flex-direction:column; align-items:center; gap:6px; }
    #voice-panel.collapsed .user-tile { width:36px; height:36px; padding:0; border-radius:50%; }
    #voice-panel.collapsed .user-tile .user-tile-inner { width:36px; height:36px; }
    #voice-panel.collapsed .user-tile .user-tile-inner > div:first-child { width:36px; height:36px; font-size:14px; }
    #voice-panel.collapsed .user-tile .user-name,
    #voice-panel.collapsed .user-tile .user-muted-badge { display:none; }
    #voice-panel.collapsed .voice-controls { flex-direction:column; align-items:center; gap:10px; }
    #voice-panel.collapsed .voice-controls .orb-wrap { width:40px; height:40px; }
    #voice-panel.collapsed .voice-controls .orb-wrap button { width:40px; height:40px; }
    #controls { grid-area:controls; }
    #header { grid-area:header; }
    .sidebar-toggle, .voice-toggle { width:20px; min-height:100%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-dim); transition:background 0.2s; border:none; background:transparent; flex-shrink:0; }
    .sidebar-toggle:hover, .voice-toggle:hover { background:var(--card-hover); }
    .sidebar-toggle { border-right:1px solid var(--border); }
    .voice-toggle { border-left:1px solid var(--border); }
    .voice-toggle { border-left:1px solid var(--border); }

    .room-item {
      position:relative; border-radius:8px; padding:6px 8px; cursor:pointer;
      display:flex; align-items:center; gap:10px;
      transition:background 0.12s ease;
    }
    .room-item:hover { background:rgba(255,255,255,0.04); }
    .room-item:active { background:rgba(255,255,255,0.06); }
    .room-item.active { background:rgba(79,125,255,0.1); }
    .room-item.active:hover { background:rgba(79,125,255,0.14); }
    .room-item.active::before {
      content:''; position:absolute; left:-8px; top:50%; transform:translateY(-50%);
      width:4px; height:50%; border-radius:0 4px 4px 0; background:#4f7dff;
    }
    .room-badge {
      font-size:10px; font-weight:700; min-width:18px; text-align:center;
      padding:1px 5px; border-radius:10px;
      background:rgba(255,255,255,0.06); color:var(--text-dim);
    }
    .room-item.active .room-badge { background:rgba(79,125,255,0.2); color:#6b93ff; }
    .light .room-item:hover { background:rgba(0,0,0,0.04); }
    .light .room-item:active { background:rgba(0,0,0,0.06); }
    .light .room-item.active { background:rgba(79,125,255,0.08); }
    .light .room-item.active:hover { background:rgba(79,125,255,0.12); }
    .light .room-badge { background:rgba(0,0,0,0.05); }
    .light .room-item.active .room-badge { background:rgba(79,125,255,0.15); color:#4f7dff; }
    #sidebar.collapsed .room-item { justify-content:center; padding:8px 0; }
    #sidebar.collapsed .room-item.active::before { display:none; }
    #sidebar.collapsed .room-item.active { background:rgba(79,125,255,0.12); }
    #sidebar.collapsed .room-badge { display:none; }
    .room-avatar { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:white; flex-shrink:0; }
    .user-tile { transition:all 0.2s; }
    .msg-content pre { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; margin: 4px 0; font-size: 12px; font-family: monospace; overflow-x: auto; white-space: pre-wrap; border: 1px solid var(--border); }
    .msg-content code { background: rgba(0,0,0,0.15); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: monospace; }
    .msg-content pre code { background: none; padding: 0; border-radius: 0; }
    .msg-content a { color: #6b93ff; text-decoration: underline; }
    .msg-content a:hover { color: #4f7dff; }
    .msg-content img { max-width: 300px; max-height: 200px; border-radius: 12px; object-fit: cover; cursor: pointer; margin-top: 4px; }
    .msg-content li { margin-left: 16px; list-style: disc; }
    .msg-content strong { font-weight: 700; }
    .msg-content em { font-style: italic; }
    .msg-content del { text-decoration: line-through; opacity: 0.6; }
    .light .msg-content pre { background: rgba(0,0,0,0.06); border-color: var(--border2); }
    .light .msg-content code { background: rgba(0,0,0,0.08); }
    .light .msg-content a { color: #3b5bdb; }

    /* 自定义滚动条 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    .light ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); }
    .light ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }
    #chat-input { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }
    .light #chat-input { scrollbar-color: rgba(0,0,0,0.12) transparent; }

    .collapse-content { overflow: hidden; transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease; }
    .collapse-content.collapsed { max-height: 0 !important; opacity: 0; }
    .collapse-toggle { transition: transform 0.25s ease; }
    .collapse-toggle.collapsed { transform: rotate(-90deg); }
    .members-grid { transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease, padding 0.3s ease; overflow: hidden; }
    .members-grid.collapsed { max-height: 0 !important; opacity: 0; padding-top: 0; padding-bottom: 0; }

    @media(max-width:768px){
      #app { grid-template-columns:1fr; grid-template-rows:64px 1fr 72px; grid-template-areas:"header" "main" "controls"; }
      #sidebar { display:none; position:fixed; top:64px; left:0; bottom:72px; width:260px; z-index:100; box-shadow:4px 0 20px rgba(0,0,0,0.5); }
      #sidebar.open { display:flex; }
      #sidebar.collapsed { width:260px; }
      #voice-panel { display:none; }
      .sidebar-toggle, .voice-toggle { display:none; }
      #room-screen { flex-direction:column !important; }
    }
  </style>
</head>
<body class="bg-squawk-bg text-squawk-text font-sans">
<div id="app">
  <!-- 头部 -->
  <header id="header" class="flex items-center px-6 bg-squawk-bg/80 backdrop-blur-xl border-b border-squawk-border gap-3">
    <button class="md:hidden flex items-center justify-center w-9 h-9 rounded-lg bg-squawk-bg3 border border-squawk-border text-squawk-text-mid cursor-pointer hover:text-squawk-blue hover:border-squawk-blue transition-all" id="menu-btn" title="打开菜单">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="flex items-center gap-2.5">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-squawk-blue to-purple-500 flex items-center justify-center shadow-lg shadow-squawk-blue-glow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </div>
      <div class="text-lg font-extrabold tracking-tight">Privalk</div>
    </div>
    <div class="ml-auto flex items-center gap-2.5">
      <button class="w-9 h-9 rounded-xl bg-squawk-bg3 border border-squawk-border text-squawk-text-mid cursor-pointer flex items-center justify-center transition-all hover:border-squawk-blue hover:text-squawk-blue" id="theme-btn" title="切换主题">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="theme-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div class="flex items-center gap-1.5 bg-squawk-card border border-squawk-border rounded-full py-1 px-3 text-[11px] font-semibold text-squawk-text-mid">
        <div class="w-1.5 h-1.5 rounded-full bg-squawk-green shadow-[0_0_6px_var(--tw-color-squawk-green)] animate-pulse-dot"></div>
        <span id="conn-status">连接中</span>
      </div>
    </div>
  </header>

  <!-- 侧边栏 -->
  <div class="sidebar-wrap">
    <nav id="sidebar">
      <div class="sidebar-header text-[10px] font-bold tracking-[0.12em] uppercase text-squawk-text-dim px-2.5 mb-1.5 flex items-center justify-between h-6">
        <span class="sidebar-header-text">频道</span>
        <button class="w-5 h-5 rounded-md bg-squawk-blue border-none text-white cursor-pointer flex items-center justify-center transition-all hover:bg-squawk-blue2 hover:scale-110 shadow-md shadow-squawk-blue-glow" id="open-create-modal" title="创建频道">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div id="room-list" class="flex-1 overflow-y-auto flex flex-col gap-0.5">
        <div class="sidebar-text text-center py-8 px-3 text-squawk-text-dim text-xs leading-relaxed">
          <strong class="block text-sm text-squawk-text-mid font-bold mb-1">暂无频道</strong>
          点击 + 创建一个频道
        </div>
      </div>
    </nav>
    <button class="sidebar-toggle" id="sidebar-toggle" title="折叠频道">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
  </div>

  <!-- 主内容 -->
  <main id="main" class="flex flex-col items-center justify-center p-8 relative overflow-hidden bg-squawk-bg">
    <!-- 欢迎屏幕 -->
    <div id="welcome-screen" class="relative z-10 text-center max-w-[400px] animate-fade-up">
      <div class="flex items-center justify-center gap-1.5 h-16 mb-6">
        <span class="block w-[5px] rounded bg-gradient-to-t from-squawk-blue to-purple-500 animate-wave-big h-5" style="animation-delay:0s"></span>
        <span class="block w-[5px] rounded bg-gradient-to-t from-squawk-blue to-purple-500 animate-wave-big h-9" style="animation-delay:0.1s"></span>
        <span class="block w-[5px] rounded bg-gradient-to-t from-squawk-blue to-purple-500 animate-wave-big h-[52px]" style="animation-delay:0.2s"></span>
        <span class="block w-[5px] rounded bg-gradient-to-t from-squawk-blue to-purple-500 animate-wave-big h-16" style="animation-delay:0.3s"></span>
        <span class="block w-[5px] rounded bg-gradient-to-t from-squawk-blue to-purple-500 animate-wave-big h-[52px]" style="animation-delay:0.4s"></span>
        <span class="block w-[5px] rounded bg-gradient-to-t from-squawk-blue to-purple-500 animate-wave-big h-9" style="animation-delay:0.5s"></span>
        <span class="block w-[5px] rounded bg-gradient-to-t from-squawk-blue to-purple-500 animate-wave-big h-5" style="animation-delay:0.6s"></span>
      </div>
      <div class="text-[13px] font-semibold text-squawk-text-mid mb-1.5">很高兴见到你</div>
      <div class="text-[34px] font-extrabold tracking-tight leading-tight mb-7">
        来看看<span class="text-squawk-blue">Privalk</span><br>能做什么
      </div>
      <div class="bg-squawk-bg3 border border-squawk-border rounded-2xl p-5 flex flex-col gap-3 shadow-2xl shadow-black/30">
        <div class="text-[11px] font-bold text-squawk-text-dim tracking-[0.08em] uppercase text-left">你的昵称</div>
        <input class="w-full bg-white/5 border border-squawk-border2 rounded-xl py-3 px-4 text-squawk-text font-medium text-sm outline-none transition-all focus:border-squawk-blue focus:shadow-[0_0_0_3px_var(--tw-color-squawk-blue-soft)] focus:bg-squawk-blue/5 placeholder:text-squawk-text-dim placeholder:font-normal" id="name-input" placeholder="例如：大神、小明、高手..." maxlength="24"/>
        <button class="bg-squawk-blue text-white text-sm font-bold border-none rounded-xl py-3 px-7 cursor-pointer transition-all hover:bg-squawk-blue2 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-squawk-blue-glow active:translate-y-0 disabled:opacity-35 disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none" id="save-name-btn">开始 →</button>
      </div>
    </div>

    <!-- 频道屏幕 -->
    <div id="room-screen" class="hidden relative z-10 w-full h-full flex-row">
      <!-- 语音面板 -->
      <div class="voice-wrap">
        <div id="voice-panel">
          <div class="voice-header text-center">

<script src="/socket.io/socket.io.js"></script>
<script>
// ── 状态 ──
let socket, userName=localStorage.getItem('squawk-name')||'', currentRoom=null, currentOwner=null, isMuted=false, localStream=null, currentRoomPrivate=false;
const peers={}, ICE={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};
const audioCtx=new AudioContext(), analyserNodes={};
let selfAnalyser=null, typingTimer=null, isTypingNow=false;

const $=id=>document.getElementById(id);
const welcomeScreen=$('welcome-screen'), roomScreen=$('room-screen');
const nameInput=$('name-input'), saveNameBtn=$('save-name-btn');
const selfNameDisp=$('self-name-display'), selfAvatarEl=$('self-avatar');
const selfStatus=$('self-status'), muteBtn=$('mute-btn'), leaveBtn=$('leave-btn');
const roomList=$('room-list'), usersGrid=$('users-grid');
const createModal=$('create-modal'), newRoomInput=$('new-room-input');
const renameModal=$('rename-modal'), renameInput=$('rename-input');
const orbBtn=$('orb-btn'), chatInput=$('chat-input'), sendBtn=$('send-btn');
const chatMessages=$('chat-messages'), typingIndicator=$('typing-indicator');
const ownerBadge=$('owner-badge');
const ctxChannel=$('ctx-channel'), ctxUser=$('ctx-user');

// ── 辅助函数 ──
const EMOJIS=['🦊','🐺','🐯','🦁','🐻','🐼','🐨','🦝','🐸','🦄','🐙','🦋','🦅','🐬','🦁'];
const COLORS=[['#6366f1','#8b5cf6'],['#3b82f6','#06b6d4'],['#f59e0b','#ef4444'],['#10b981','#3b82f6'],['#ec4899','#f43f5e'],['#8b5cf6','#6366f1']];
function nameHash(n){let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))>>>0;return h;}
function nameEmoji(n){return EMOJIS[nameHash(n)%EMOJIS.length];}
function nameColor(n){return COLORS[nameHash(n)%COLORS.length];}
function nameInitial(n){return n?n.charAt(0).toUpperCase():'?';}
const AVATAR_GRADIENTS=[
  ['#6366f1','#8b5cf6'],['#3b82f6','#06b6d4'],['#f59e0b','#ef4444'],
  ['#10b981','#3b82f6'],['#ec4899','#f43f5e'],['#8b5cf6','#6366f1'],
  ['#14b8a6','#3b82f6'],['#f97316','#ef4444'],['#06b6d4','#3b82f6'],
  ['#a855f7','#ec4899'],['#22c55e','#14b8a6'],['#e11d48','#f43f5e'],
];
function avatarGradient(n){return AVATAR_GRADIENTS[nameHash(n)%AVATAR_GRADIENTS.length];}
function avatarHtml(name,size){
  const [c1,c2]=avatarGradient(name);
  const initial=nameInitial(name);
  const s=size||30;
  return `<div class="room-avatar" style="width:${s}px;height:${s}px;background:linear-gradient(135deg,${c1},${c2});font-size:${Math.round(s*0.45)}px">${initial}</div>`;
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderMd(text){
  let s=escHtml(text);
  // 代码块 ```
  s=s.replace(/```([\s\S]*?)```/g,'<pre class="bg-black/20 rounded-lg p-2.5 my-1 text-[12px] font-mono overflow-x-auto whitespace-pre-wrap border border-squawk-border">$1</pre>');
  // 行内代码
  s=s.replace(/`([^`]+)`/g,'<code class="bg-black/15 px-1.5 py-0.5 rounded text-[12px] font-mono text-squawk-blue2">$1</code>');
  // 粗体
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong class="font-bold">$1</strong>');
  // 斜体
  s=s.replace(/\*(.+?)\*/g,'<em class="italic">$1</em>');
  // 删除线
  s=s.replace(/~~(.+?)~~/g,'<del class="line-through opacity-60">$1</del>');
  // 链接
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" class="text-squawk-blue underline hover:text-squawk-blue2">$1</a>');
  // 图片 ![alt](url)
  s=s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" class="max-w-[300px] max-h-[200px] rounded-xl object-cover cursor-pointer mt-1">');
  // 无序列表
  s=s.replace(/(^|\n)[-*] (.+?)(?=\n|$)/g,'$1<li class="ml-4 list-disc">$2</li>');
  // 引用
  s=s.replace(/(^|\n)&gt; (.+?)(?=\n|$)/g,'$1<div class="border-l-2 border-squawk-blue/40 pl-3 py-0.5 my-1 text-squawk-text-mid italic">$2</div>');
  // 换行
  s=s.replace(/\n/g,'<br>');
  return s;
}
function formatTime(ts){const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function toast(msg,type=''){const t=document.createElement('div');t.className=`px-3.5 py-2.5 bg-squawk-bg3 border border-squawk-border2 rounded-xl text-xs font-semibold shadow-lg shadow-black/40 animate-toast-in ${type==='error'?'border-squawk-red/40 text-squawk-red':'border-squawk-blue/40 text-squawk-blue2'}`;t.textContent=msg;$('toast-container').appendChild(t);setTimeout(()=>t.remove(),3100);}
function isOwner(){return userName===currentOwner;}
function updateOwnerUI(){ownerBadge.classList.toggle('hidden',!isOwner());}

// ── 昵称 ──
function applyName(name){
  userName=name; selfNameDisp.textContent=name;
  const [c1,c2]=avatarGradient(name);
  selfAvatarEl.innerHTML=`<div class="w-full h-full rounded-xl flex items-center justify-center font-bold text-white text-sm" style="background:linear-gradient(135deg,${c1},${c2})">${nameInitial(name)}</div>`;
  if(name) welcomeScreen.style.display='none';
}
if(userName){nameInput.value=userName;applyName(userName);}
saveNameBtn.addEventListener('click',()=>{const n=nameInput.value.trim();if(!n)return toast('请先输入昵称','error');localStorage.setItem('squawk-name',n);applyName(n);toast(`欢迎，${n}！`,'success');});
nameInput.addEventListener('keydown',e=>{if(e.key==='Enter')saveNameBtn.click();});
$('menu-btn').addEventListener('click',()=>$('sidebar').classList.toggle('open'));

// ── 主题切换 ──
const themeBtn=$('theme-btn');
const SUN_SVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
const MOON_SVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
function applyTheme(theme){
  if(theme==='light'){document.documentElement.classList.add('light');themeBtn.innerHTML=SUN_SVG;}
  else{document.documentElement.classList.remove('light');themeBtn.innerHTML=MOON_SVG;}
  localStorage.setItem('privalk-theme',theme);
}
applyTheme(localStorage.getItem('privalk-theme')||(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'));
themeBtn.addEventListener('click',()=>{
  const isLight=document.documentElement.classList.contains('light');
  applyTheme(isLight?'dark':'light');
});

// ── 侧边栏/语音面板折叠 ──
const ARROW_LEFT='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
const ARROW_RIGHT='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
function setupPanelCollapse(toggleId, panelId, storageKey, collapsedSvg, expandedSvg){
  const toggle=$(toggleId), panel=$(panelId);
  if(!toggle||!panel)return;
  const collapsed=localStorage.getItem(storageKey)==='true';
  if(collapsed){panel.classList.add('collapsed');toggle.innerHTML=collapsedSvg;}
  toggle.addEventListener('click',()=>{
    const isCollapsed=panel.classList.toggle('collapsed');
    toggle.innerHTML=isCollapsed?collapsedSvg:expandedSvg;
    localStorage.setItem(storageKey,isCollapsed);
  });
}
setupPanelCollapse('sidebar-toggle','sidebar','privalk-sidebar-collapsed',ARROW_RIGHT,ARROW_LEFT);
setupPanelCollapse('voice-toggle','voice-panel','privalk-voice-collapsed',ARROW_LEFT,ARROW_RIGHT);

// ── 右键菜单 ──
let ctxRoomId=null, ctxTargetSocketId=null, ctxTargetName=null, longPressTimer=null;

function showMenu(menu,e){
  [ctxChannel,ctxUser].forEach(m=>m.classList.add('hidden'));
  menu.classList.remove('hidden');
  const x=Math.min((e.clientX||e.touches?.[0]?.clientX||0),window.innerWidth-190);
  const y=Math.min((e.clientY||e.touches?.[0]?.clientY||0),window.innerHeight-120);
  menu.style.left=x+'px'; menu.style.top=y+'px';
}
function hideMenus(){ctxChannel.classList.add('hidden');ctxUser.classList.add('hidden');ctxRoomId=null;ctxTargetSocketId=null;ctxTargetName=null;}
document.addEventListener('click',hideMenus);
document.addEventListener('keydown',e=>{if(e.key==='Escape')hideMenus();});

$('ctx-rename').addEventListener('click',()=>{
  if(!ctxRoomId||!isOwner())return;
  renameInput.value=ctxRoomId;
  renameModal.classList.remove('hidden');
  renameInput.focus(); renameInput.select();
  hideMenus();
});
$('ctx-delete').addEventListener('click',()=>{
  if(!ctxRoomId||!isOwner())return;
  socket.emit('delete-channel',{roomId:ctxRoomId},res=>{
    if(res.error)return toast(res.error,'error');
    toast('频道已删除','success');
    if(currentRoom===ctxRoomId)leaveRoom();
  });
  hideMenus();
});

$('ctx-kick').addEventListener('click',()=>{
  if(!ctxTargetSocketId||!isOwner())return;
  socket.emit('kick-user',{targetSocketId:ctxTargetSocketId},res=>{
    if(res.error)return toast(res.error,'error');
    toast(`已踢出 ${escHtml(ctxTargetName)}`,'success');
  });
  hideMenus();
});

$('cancel-rename').addEventListener('click',()=>renameModal.classList.add('hidden'));
$('confirm-rename').addEventListener('click',doRename);
renameInput.addEventListener('keydown',e=>{if(e.key==='Enter')doRename();});
function doRename(){
  const n=renameInput.value.trim(); if(!n)return toast('请输入名称','error');
  socket.emit('rename-channel',{roomId:currentRoom||ctxRoomId,newName:n},res=>{
    if(res.error)return toast(res.error,'error');
    renameModal.classList.add('hidden');
    toast('频道已重命名','success');
  });
}

// ── 移动端标签切换 ──
function switchTab(tab){
  if(tab==='chat'){roomScreen.classList.add('show-chat');$('tab-chat').classList.add('active');$('tab-voice').classList.remove('active');scrollChat();}
  else{roomScreen.classList.remove('show-chat');$('tab-voice').classList.add('active');$('tab-chat').classList.remove('active');}
}

// ── Socket连接 ──
socket=io();

$('edit-name-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  $('rename-user-input').value = userName;
  $('rename-user-modal').classList.remove('hidden');
  $('rename-user-input').focus();
  $('rename-user-input').select();
});
$('cancel-rename-user').addEventListener('click', (e) => {
  e.stopPropagation();
  $('rename-user-modal').classList.add('hidden');
});
$('confirm-rename-user').addEventListener('click', (e) => {
  e.stopPropagation();
  doRenameUser();
});
$('rename-user-modal').addEventListener('click', (e) => e.stopPropagation());
$('rename-user-input').addEventListener('keydown', e => { if (e.key === 'Enter') doRenameUser(); });

function doRenameUser() {
  const n = $('rename-user-input').value.trim();
  if (!n) return toast('请输入昵称', 'error');
  if (n === userName) { $('rename-user-modal').classList.add('hidden'); return; }
  socket.emit('rename-user', { newName: n }, res => {
    if (res.error) return toast(res.error, 'error');
    localStorage.setItem('squawk-name', n);
    applyName(n);
    $('rename-user-modal').classList.add('hidden');
    toast('昵称已更新！', 'success');
  });
}

socket.on('connect',()=>{$('conn-status').textContent='在线';toast('已连接','success');});
socket.on('disconnect',()=>{$('conn-status').textContent='离线';toast('连接断开','error');});
socket.on('kicked',({by})=>{leaveRoom();toast(`你被 ${escHtml(by)} 踢出了频道`,'error');});
socket.on('error-msg',(msg)=>{toast(msg,'error');});
socket.on('channel-deleted',({roomId})=>{if(currentRoom===roomId){leaveRoom();toast('频道已被删除','error');}});
socket.on('channel-renamed',({oldId,newId})=>{
  if(currentRoom===oldId){
    currentRoom=newId;
    $('current-room-name').textContent=newId;
    selfStatus.textContent=newId;
  }
});
socket.on('owner-changed',({owner,users})=>{currentOwner=owner;renderUsers(users);updateOwnerUI();toast(`👑 ${escHtml(owner)} 成为了频道主`);});
socket.on('user-renamed',({socketId,oldName,newName,users,owner})=>{
  currentOwner=owner;
  renderUsers(users);
  updateOwnerUI();
  if(socketId!==socket.id) toast(`${escHtml(oldName)} 改名为 ${escHtml(newName)}`);
});
socket.on('user-kicked',({name,users,owner})=>{currentOwner=owner;renderUsers(users);toast(`${escHtml(name)} 已被踢出`);});

// ── 频道列表 ──
socket.on('room-list',rooms=>{
  if(!rooms.length){roomList.innerHTML='<div class="text-center py-8 px-3 text-squawk-text-dim text-xs leading-relaxed"><strong class="block text-sm text-squawk-text-mid font-bold mb-1">暂无频道</strong>点击 + 创建一个频道</div>';return;}
  roomList.innerHTML='';
  for(const room of rooms){
    const el=document.createElement('div');
    el.className='room-item py-2 px-3 cursor-pointer flex items-center gap-2.5'+(currentRoom===room.id?' active':''); el.dataset.roomId=room.id; el.dataset.owner=room.owner||'';
    const privateIcon=room.isPrivate?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="inline ml-1 text-squawk-red"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>':'';
    el.innerHTML=`${avatarHtml(room.name)}<div class="flex-1 min-w-0"><div class="room-name text-[13px] font-medium truncate" style="color:var(--text)">${escHtml(room.name)}${privateIcon}</div><div class="room-count text-[11px] truncate" style="color:var(--text-dim)">${room.count} 在线</div></div><div class="room-badge">${room.count}</div>`;
    el.addEventListener('click',()=>{if(!userName)return toast('请先设置昵称','error');$('sidebar').classList.remove('open');joinRoom(room.id);});
    el.addEventListener('contextmenu',e=>{
      e.preventDefault();
      if(room.owner!==userName)return;
      ctxRoomId=room.id;
      showMenu(ctxChannel,e);
    });
    el.addEventListener('touchstart',e=>{
      longPressTimer=setTimeout(()=>{
        if(room.owner!==userName)return;
        ctxRoomId=room.id; showMenu(ctxChannel,e);
      },600);
    },{passive:true});
    el.addEventListener('touchend',()=>clearTimeout(longPressTimer));
    el.addEventListener('touchmove',()=>clearTimeout(longPressTimer));
    roomList.appendChild(el);
  }
});

// ── 创建频道 ──
$('open-create-modal').addEventListener('click',()=>{if(!userName)return toast('请先设置昵称','error');createModal.classList.remove('hidden');newRoomInput.focus();});
$('cancel-create').addEventListener('click',()=>createModal.classList.add('hidden'));
$('confirm-create').addEventListener('click',createRoom);
newRoomInput.addEventListener('keydown',e=>{if(e.key==='Enter')createRoom();});
function createRoom(){
  const name=newRoomInput.value.trim(); if(!name)return toast('请输入频道名称','error');
  const defaultMuted=$('default-muted-checkbox').checked;
  const isPrivate=$('private-checkbox').checked;
  socket.emit('create-room',{roomName:name,defaultMuted,isPrivate},res=>{
    if(res.error)return toast(res.error,'error');
    createModal.classList.add('hidden'); newRoomInput.value=''; $('default-muted-checkbox').checked=false; $('private-checkbox').checked=false; joinRoom(name);
  });
}

// ── 加入频道 ──
async function joinRoom(roomId){
  if(currentRoom===roomId)return;
  if(!localStream){
    try{localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});setupSelfAnalyser(localStream);}
    catch{toast('麦克风访问被拒绝','error');return;}
  }
  if(currentRoom)leaveRoom();
  socket.emit('join-room',{roomId,userName});
  currentRoom=roomId;
  $('current-room-name').textContent=roomId;
  roomScreen.classList.remove('hidden'); roomScreen.classList.add('flex'); welcomeScreen.style.display='none';
  selfStatus.textContent=roomId; selfStatus.className='text-[10px] text-squawk-blue mt-px font-medium';
  muteBtn.disabled=false; leaveBtn.disabled=false; orbBtn.disabled=false;
  chatInput.disabled=false; sendBtn.disabled=false; screenshotBtn.disabled=false;
  document.querySelectorAll('.room-item').forEach(el=>el.classList.toggle('active',el.dataset.roomId===roomId));
}

// ── 频道事件 ──
socket.on('room-joined',async({peers:ep,users,messages,owner,defaultMuted,isPrivate})=>{
  currentOwner=owner; currentRoomPrivate=!!isPrivate; renderUsers(users); updateOwnerUI();
  for(const p of ep)await createPeer(p,true);
  chatMessages.innerHTML='';
  if(!messages||!messages.length){chatMessages.innerHTML='<div class="flex-1 flex flex-col items-center justify-center text-squawk-text-dim gap-2.5"><div class="text-4xl opacity-30">💬</div><div class="text-sm font-semibold">暂无消息</div></div>';}
  else{messages.forEach(renderMessage);}
  scrollChat();
  if(defaultMuted && !isMuted) toggleMute();
  // 私密会话指示器
  const privateBadge=$('private-badge');
  if(privateBadge) privateBadge.classList.toggle('hidden',!currentRoomPrivate);
  if(currentRoomPrivate) toast('已进入私密会话，消息不会存储','success');
});
socket.on('user-joined',async({name,users,owner})=>{currentOwner=owner;renderUsers(users);updateOwnerUI();toast(`${escHtml(name)} 加入了频道`);playSound('join');});
socket.on('user-left',({socketId,users,owner})=>{closePeer(socketId);currentOwner=owner;renderUsers(users);updateOwnerUI();playSound('leave');});
socket.on('user-muted',({users})=>renderUsers(users));

socket.on('chat-message',msg=>{
  const empty=chatMessages.querySelector('.chat-empty, .flex-1');if(empty&&empty.parentElement===chatMessages)empty.remove();
  renderMessage(msg);scrollChat();
  if(msg.socketId!==socket.id)playSound('message');
});
socket.on('typing-update',({users})=>{
  const others=users.filter(n=>n!==userName);
  typingIndicator.textContent=others.length===0?'':others.length===1?`${others[0]} 正在输入...`:`${others.slice(0,3).join(', ')} 正在输入...`;
});

function renderMessage(msg){
  const isSelf=msg.socketId===socket.id||msg.name===userName;
  const el=document.createElement('div'); el.className='flex gap-2.5 py-1 animate-msg-in'+(isSelf?' flex-row-reverse':'');
  const [c1,c2]=avatarGradient(msg.name), initial=nameInitial(msg.name);
  let content = '';
  if(msg.fileUrl) {
    const isImage = msg.fileType && msg.fileType.startsWith('image/');
    const isVideo = msg.fileType && msg.fileType.startsWith('video/');
    if(isImage) {
      content = `<img src="${escHtml(msg.fileUrl)}" class="max-w-[300px] max-h-[200px] rounded-xl object-cover cursor-pointer" alt="${escHtml(msg.fileName||'图片')}">`;
    } else if(isVideo) {
      content = `<video src="${escHtml(msg.fileUrl)}" class="max-w-[300px] max-h-[200px] rounded-xl" controls></video>`;
    } else {
      content = `<a href="${escHtml(msg.fileUrl)}" target="_blank" class="text-squawk-blue underline flex items-center gap-1">📎 ${escHtml(msg.fileName||'文件')}</a>`;
    }
    if(msg.text) content += `<div class="mt-1">${renderMd(msg.text)}</div>`;
  } else {
    content = renderMd(msg.text);
  }
  el.innerHTML=`<div class="w-[30px] h-[30px] rounded-full shrink-0 flex items-center justify-center text-sm font-bold text-white mt-0.5" style="background:linear-gradient(135deg,${c1},${c2})">${initial}</div><div class="max-w-[72%] flex flex-col gap-0.5${isSelf?' items-end':''}"><div class="flex items-baseline gap-1.5${isSelf?' flex-row-reverse':''}"><span class="text-[11px] font-bold text-squawk-text-mid">${escHtml(msg.name)}</span><span class="font-mono text-[10px] text-squawk-text-dim">${formatTime(msg.ts)}</span></div><div class="msg-content py-2 px-3 rounded-2xl text-[13px] leading-relaxed break-words font-medium${isSelf?' bg-squawk-blue text-white rounded-tl-sm shadow-md shadow-squawk-blue-glow':' bg-squawk-bg3 border border-squawk-border text-squawk-text rounded-tl-sm'}">${content}</div></div>`;
  chatMessages.appendChild(el);
}
function scrollChat(){chatMessages.scrollTop=chatMessages.scrollHeight;}

// ── 聊天 ──
function sendMessage(){
  const text=chatInput.value.trim();if(!text||!currentRoom)return;
  socket.emit('chat-message',{text});chatInput.value='';chatInput.style.height='';stopTyping();
}
sendBtn.addEventListener('click',sendMessage);
chatInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
chatInput.addEventListener('input',()=>{
  chatInput.style.height='auto'; chatInput.style.height=Math.min(chatInput.scrollHeight,100)+'px';
  if(!isTypingNow){isTypingNow=true;socket.emit('typing',{isTyping:true});}
  clearTimeout(typingTimer); typingTimer=setTimeout(stopTyping,2000);
});
chatInput.addEventListener('paste',(e)=>{
  const items=e.clipboardData?.items;if(!items)return;
  for(const item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      const file=item.getAsFile();
      if(file){
        if(file.size>50*1024*1024){toast('文件太大（最大50MB）','error');return;}
        uploadFile(file);
      }
      return;
    }
  }
});
function stopTyping(){if(isTypingNow){isTypingNow=false;socket.emit('typing',{isTyping:false});}clearTimeout(typingTimer);}

// ── 离开频道 ──
function leaveRoom(){
  socket.emit('leave-room');Object.keys(peers).forEach(closePeer);
  currentRoom=null; currentOwner=null; currentRoomPrivate=false;
  roomScreen.classList.add('hidden'); roomScreen.classList.remove('flex');
  usersGrid.innerHTML=''; chatMessages.innerHTML='<div class="flex-1 flex flex-col items-center justify-center text-squawk-text-dim gap-2.5"><div class="text-4xl opacity-30">💬</div><div class="text-sm font-semibold">暂无消息</div></div>';
  typingIndicator.textContent=''; ownerBadge.classList.add('hidden');
  selfStatus.textContent='空闲'; selfStatus.className='text-[10px] text-squawk-text-dim mt-px font-medium';
  muteBtn.disabled=true; leaveBtn.disabled=true; orbBtn.disabled=true;
  chatInput.disabled=true; chatInput.value=''; sendBtn.disabled=true; screenshotBtn.disabled=true; stopTyping();
  document.querySelectorAll('.room-item').forEach(el=>el.classList.remove('active'));
}
leaveBtn.addEventListener('click',leaveRoom);

// ── 静音 ──
const MIC_SVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
const MIC_OFF_SVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .84-.15 1.65-.42 2.4"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
const ORB_MIC_SVG='<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
const ORB_OFF_SVG='<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .84-.15 1.65-.42 2.4"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
function toggleMute(){
  isMuted=!isMuted; if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  muteBtn.innerHTML=isMuted?MIC_OFF_SVG:MIC_SVG; muteBtn.classList.toggle('bg-squawk-red/10',isMuted); muteBtn.classList.toggle('border-squawk-red/30',isMuted); muteBtn.classList.toggle('text-squawk-red',isMuted);
  orbBtn.innerHTML=isMuted?ORB_OFF_SVG:ORB_MIC_SVG; orbBtn.classList.toggle('bg-white/5',isMuted); orbBtn.classList.toggle('shadow-none',isMuted);
  $('record-label').textContent=isMuted?'已静音':'点击静音';
  socket.emit('toggle-mute',{muted:isMuted});
}
muteBtn.addEventListener('click',toggleMute);
orbBtn.addEventListener('click',toggleMute);

// ── 渲染用户 ──
function renderUsers(users){
  usersGrid.innerHTML='';
  $('members-count').textContent=users.length+' 人';
  for(const user of users){
    const isSelf=user.socketId===socket.id, tile=document.createElement('div');
    const isUserOwner=user.name===currentOwner;
    tile.className='user-tile w-24 bg-squawk-bg3 border border-squawk-border rounded-2xl py-3.5 px-2.5 flex flex-col items-center gap-2 transition-all relative overflow-hidden'+(user.muted?' opacity-50':'')+(isUserOwner?' border-squawk-gold/30':''); tile.id=`tile-${user.socketId}`;
    const [c1,c2]=avatarGradient(user.name), initial=nameInitial(user.name);
    tile.innerHTML=`
      <div class="user-tile-inner relative">
        <div class="w-12 h-12 rounded-full relative flex items-center justify-center z-10">
          <div class="w-full h-full rounded-full flex items-center justify-center font-bold text-white text-[20px] border-2 border-transparent transition-colors" style="background:linear-gradient(135deg,${c1},${c2})">${initial}</div>
          ${isUserOwner?'<div class="absolute -top-2 -right-1 text-sm z-20 drop-shadow-[0_1px_3px_rgba(0,0,0,0.5)]">👑</div>':''}
        </div>
      </div>
      <div class="user-name text-[11px] font-semibold text-center truncate max-w-[80px] z-10">${escHtml(user.name)}${isSelf?' ✦':''}</div>
      <div class="user-muted-badge text-[10px] text-squawk-red z-10${user.muted?'':' hidden'}">🔇 已静音</div>`;

    if(isOwner()&&!isSelf){
      tile.style.cursor='context-menu';
      tile.addEventListener('contextmenu',e=>{
        e.preventDefault();
        ctxTargetSocketId=user.socketId; ctxTargetName=user.name;
        showMenu(ctxUser,e);
      });
      tile.addEventListener('touchstart',e=>{
        longPressTimer=setTimeout(()=>{ctxTargetSocketId=user.socketId;ctxTargetName=user.name;showMenu(ctxUser,e);},600);
      },{passive:true});
      tile.addEventListener('touchend',()=>clearTimeout(longPressTimer));
      tile.addEventListener('touchmove',()=>clearTimeout(longPressTimer));
    }
    usersGrid.appendChild(tile);
  }
}

// ── WebRTC ──
socket.on('offer',async({from,offer})=>{const pc=await createPeer(from,false);await pc.setRemoteDescription(new RTCSessionDescription(offer));const answer=await pc.createAnswer();await pc.setLocalDescription(answer);socket.emit('answer',{to:from,answer});});
socket.on('answer',async({from,answer})=>{const pc=peers[from];if(pc)await pc.setRemoteDescription(new RTCSessionDescription(answer));});
socket.on('ice-candidate',async({from,candidate})=>{const pc=peers[from];if(pc&&candidate)try{await pc.addIceCandidate(new RTCIceCandidate(candidate));}catch{}});

async function createPeer(peerId,initiator){
  if(peers[peerId])return peers[peerId];
  const pc=new RTCPeerConnection(ICE); peers[peerId]=pc;
  if(localStream)localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.onicecandidate=({candidate})=>{if(candidate)socket.emit('ice-candidate',{to:peerId,candidate});};
  pc.ontrack=({streams})=>{if(!streams[0])return;const a=new Audio();a.srcObject=streams[0];a.autoplay=true;setupRemoteAnalyser(peerId,streams[0]);};
  if(initiator){const offer=await pc.createOffer();await pc.setLocalDescription(offer);socket.emit('offer',{to:peerId,offer});}
  return pc;
}
function closePeer(id){if(peers[id]){peers[id].close();delete peers[id];}if(analyserNodes[id]){analyserNodes[id].source?.disconnect();delete analyserNodes[id];}}

// ── 音频分析 ──
function setupSelfAnalyser(stream){try{if(audioCtx.state==='suspended')audioCtx.resume();const src=audioCtx.createMediaStreamSource(stream),an=audioCtx.createAnalyser();an.fftSize=256;src.connect(an);selfAnalyser={analyser:an,source:src};animateSelf();}catch{}}
function setupRemoteAnalyser(id,stream){try{if(audioCtx.state==='suspended')audioCtx.resume();const src=audioCtx.createMediaStreamSource(stream),an=audioCtx.createAnalyser();an.fftSize=256;src.connect(an);analyserNodes[id]={analyser:an,source:src};animateRemote(id);}catch{}}
function getVolume(an){const b=new Uint8Array(an.frequencyBinCount);an.getByteFrequencyData(b);return b.reduce((a,v)=>a+v,0)/b.length;}
function animateSelf(){if(!selfAnalyser)return;const vol=getVolume(selfAnalyser.analyser),tile=document.getElementById(`tile-${socket.id}`);if(tile){tile.classList.toggle('speaking',vol>12&&!isMuted);}requestAnimationFrame(animateSelf);}
function animateRemote(id){const node=analyserNodes[id];if(!node)return;const vol=getVolume(node.analyser),tile=document.getElementById(`tile-${id}`);if(tile){tile.classList.toggle('speaking',vol>8);}requestAnimationFrame(()=>{if(analyserNodes[id])animateRemote(id);});}

// ── 声音通知 ──
function playSound(type){
  try{
    if(audioCtx.state==='suspended')audioCtx.resume();
    const gain=audioCtx.createGain(); gain.connect(audioCtx.destination);
    if(type==='join'){
      [523.25,659.25].forEach((freq,i)=>{
        const osc=audioCtx.createOscillator(),g=audioCtx.createGain(); osc.connect(g);g.connect(gain);
        osc.type='sine';osc.frequency.value=freq; const t=audioCtx.currentTime+i*0.12;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.18,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
        osc.start(t);osc.stop(t+0.4);
      });
    } else if(type==='leave'){
      [659.25,493.88].forEach((freq,i)=>{
        const osc=audioCtx.createOscillator(),g=audioCtx.createGain(); osc.connect(g);g.connect(gain);
        osc.type='sine';osc.frequency.value=freq; const t=audioCtx.currentTime+i*0.12;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.14,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
        osc.start(t);osc.stop(t+0.35);
      });
    } else if(type==='message'){
      const osc=audioCtx.createOscillator(),g=audioCtx.createGain(); osc.connect(g);g.connect(gain);
      osc.type='sine'; osc.frequency.setValueAtTime(880,audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(440,audioCtx.currentTime+0.08);
      g.gain.setValueAtTime(0,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0.12,audioCtx.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);
      osc.start();osc.stop(audioCtx.currentTime+0.15);
    }
  }catch{}
}

// ── 文件上传 ──
const fileInput = $('file-input');
const fileBtn = $('file-btn');

fileBtn.addEventListener('click', () => {
  if (!currentRoom) return toast('请先加入频道', 'error');
  fileInput.click();
});

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  if (file.size > 50 * 1024 * 1024) {
    toast('文件太大（最大50MB）', 'error');
    return;
  }

  uploadFile(file);
  fileInput.value = '';
});

// ── 截图功能 ──
const screenshotBtn = $('screenshot-btn');
screenshotBtn.addEventListener('click', async () => {
  if (!currentRoom) return toast('请先加入频道', 'error');
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' } });
    const video = document.createElement('video');
    video.srcObject = stream;
    await video.play();

    // 等待一帧渲染
    await new Promise(r => requestAnimationFrame(r));

    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);

    // 停止所有轨道
    stream.getTracks().forEach(t => t.stop());

    canvas.toBlob(blob => {
      if (!blob) return toast('截图失败', 'error');
      const file = new File([blob], `screenshot_${Date.now()}.png`, { type: 'image/png' });
      uploadFile(file);
    }, 'image/png');
  } catch (err) {
    if (err.name !== 'AbortError') toast('截图取消或失败', 'error');
  }
});

function uploadFile(file) {
  if(currentRoomPrivate){
    // 私密会话：Base64 传输
    toast('正在处理...', 'success');
    const reader=new FileReader();
    reader.onload=()=>{
      socket.emit('chat-message',{
        text:'',
        fileUrl:reader.result,
        fileName:file.name,
        fileType:file.type
      });
      toast('已发送','success');
    };
    reader.onerror=()=>toast('处理失败','error');
    reader.readAsDataURL(file);
  } else {
    const formData = new FormData();
    formData.append('file', file);
    toast('正在上传...', 'success');
    fetch('/upload', {
      method: 'POST',
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      if(data.error) {
        toast(data.error, 'error');
        return;
      }
      socket.emit('chat-message', {
        text: '',
        fileUrl: data.url,
        fileName: data.originalname,
        fileType: data.mimetype
      });
      toast('上传成功！', 'success');
    })
    .catch(err => toast('上传失败: ' + err.message, 'error'));
  }
}

// ── 表情选择器 ──
const emojiModal = $('emoji-modal');
const emojiBtn = $('emoji-btn');
const cancelEmoji = $('cancel-emoji');

emojiBtn.addEventListener('click', () => {
  if (!currentRoom) return toast('请先加入频道', 'error');
  emojiModal.classList.remove('hidden');
});

cancelEmoji.addEventListener('click', () => {
  emojiModal.classList.add('hidden');
});

emojiModal.addEventListener('click', (e) => {
  if (e.target === emojiModal) {
    emojiModal.classList.add('hidden');
  }
});

function insertEmoji(emoji) {
  const chatInput = $('chat-input');
  const start = chatInput.selectionStart;
  const end = chatInput.selectionEnd;
  const text = chatInput.value;

  chatInput.value = text.substring(0, start) + emoji + text.substring(end);
  chatInput.focus();

  const newPos = start + emoji.length;
  chatInput.setSelectionRange(newPos, newPos);

  emojiModal.classList.add('hidden');
}

// ── 图片灯箱 ──
const lightbox = $('lightbox');
const lightboxImg = $('lightbox-img');
const lightboxInfo = $('lightbox-info');

function openLightbox(src, info) {
  lightboxImg.src = src;
  lightboxInfo.textContent = info || '';
  lightbox.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.add('hidden');
  lightboxImg.src = '';
  document.body.style.overflow = '';
}

$('lightbox-close').addEventListener('click', (e) => { e.stopPropagation(); closeLightbox(); });
lightbox.addEventListener('click', (e) => { if (e.target === lightbox || e.target === lightboxImg) closeLightbox(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !lightbox.classList.contains('hidden')) closeLightbox(); });

// 代理聊天消息中的图片点击
chatMessages.addEventListener('click', (e) => {
  const img = e.target.closest('img');
  if (img && img.src && !img.closest('a')) {
    e.preventDefault();
    openLightbox(img.src, img.alt || '');
  }
});

// ── 启用/禁用按钮 ──
function updateChatButtons() {
  const enabled = !!currentRoom;
  fileBtn.disabled = !enabled;
  emojiBtn.disabled = !enabled;
  screenshotBtn.disabled = !enabled;
}

// 在加入/离开频道时更新按钮状态
const originalJoinRoom = joinRoom;
joinRoom = async function(roomId) {
  await originalJoinRoom(roomId);
  updateChatButtons();
};

const originalLeaveRoom = leaveRoom;
leaveRoom = function() {
  originalLeaveRoom();
  updateChatButtons();
};
